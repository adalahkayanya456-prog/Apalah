<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FATAL SYSTEM ERROR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Creepster&family=JetBrains+Mono:wght@700&display=swap');
        
        body {
            background-color: #000;
            color: #ff0000;
            margin: 0;
            overflow: hidden;
            font-family: 'JetBrains+Mono', monospace;
        }

        /* Efek Bergetar Seluruh Layar saat Error */
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }

        .shaking {
            animation: shake 0.2s infinite;
        }

        /* Overlay Merah Berkedip */
        .red-overlay {
            position: fixed;
            inset: 0;
            background: rgba(255, 0, 0, 0.2);
            pointer-events: none;
            z-index: 100;
            animation: pulse 0.1s infinite;
            display: none;
        }

        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }

        /* Background Halaman Error */
        #errorPage {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 50;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(rgba(0,0,0,0.9), rgba(150,0,0,0.6)), url('background.jpg');
            background-size: cover;
            background-position: center;
        }

        /* Font Horor untuk Judul */
        .horror-text {
            font-family: 'Creepster', cursive;
            text-shadow: 0 0 20px #ff0000, 0 0 40px #000;
        }

        .scanline {
            width: 100%;
            height: 100px;
            z-index: 110;
            background: linear-gradient(0deg, rgba(0, 0, 0, 0) 0%, rgba(255, 0, 0, 0.2) 50%, rgba(0, 0, 0, 0) 100%);
            opacity: 0.1;
            position: absolute;
            bottom: 100%;
            animation: scanline 3s linear infinite;
        }

        @keyframes scanline {
            0% { bottom: 100%; }
            100% { bottom: -100%; }
        }
    </style>
</head>
<body>

    <div class="red-overlay" id="overlay"></div>
    <div class="scanline"></div>

    <div id="activationPage" class="flex h-screen items-center justify-center">
        <button onclick="triggerNightmare()" class="border-2 border-white text-white px-16 py-6 text-xl font-bold hover:bg-white hover:text-black transition-all">
            PENCET DONG 
        </button>
    </div>

    <div id="errorPage">
        <div class="text-center p-10 bg-black/80 border-4 border-red-600 shadow-[0_0_50px_#ff0000] max-w-lg">
            <h1 class="horror-text text-7xl text-red-600 mb-4 uppercase">SYSTEM BREACHED</h1>
            <p class="text-white text-sm tracking-widest mb-8">PENGHAPUSAN DATA DIMULAI...</p>
            
            <div class="mb-10">
                <div class="text-xs text-red-500 mb-2">TIME UNTIL TOTAL WIPEOUT:</div>
                <div id="timer" class="text-5xl font-black text-white bg-red-900/40 p-4 rounded border border-red-600">04:00:00:00</div>
            </div>

            <div class="space-y-4">
                <input type="password" id="pass" placeholder="INPUT DECRYPTION KEY" class="w-full bg-black border-2 border-red-600 p-4 outline-none text-center text-red-500 text-xl font-bold placeholder:text-red-900">
                <button onclick="check()" class="w-full bg-red-600 text-white py-4 font-black hover:bg-red-800 transition-all uppercase tracking-tighter">STOP ENCRYPTION</button>
            </div>
            
            <p class="mt-8 text-[10px] text-gray-500 animate-pulse">
                IP ADDRESS AND GEOLOCATION LOGGED. AUTHORITIES NOTIFIED.
            </p>
        </div>
    </div>

    <audio id="scareAudio" loop>
        <source src="modar.mp3" type="audio/mpeg">
    </audio>

    <script>
        function triggerNightmare() {
            // Aktifkan Audio & Fade-in
            const audio = document.getElementById('scareAudio');
            audio.volume = 0;
            audio.play();
            let vol = 0;
            const fadeIn = setInterval(() => {
                if (vol < 1) { vol += 0.05; audio.volume = vol.toFixed(2); } 
                else { clearInterval(fadeIn); }
            }, 100);

            // Ganti Tampilan
            document.getElementById('activationPage').style.display = 'none';
            document.getElementById('errorPage').style.display = 'flex';
            document.getElementById('overlay').style.display = 'block';
            
            // Tambahkan efek getar ke body
            document.body.classList.add('shaking');

            // Timer 4 Hari
            let seconds = 4 * 24 * 60 * 60;
            setInterval(() => {
                seconds--;
                let d = Math.floor(seconds / 86400);
                let h = Math.floor((seconds % 86400) / 3600);
                let m = Math.floor((seconds % 3600) / 60);
                let s = seconds % 60;
                document.getElementById('timer').innerText = 
                    `${String(d).padStart(2,'0')}:${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
            }, 1000);
        }

        function check() {
            if(document.getElementById('pass').value === "666") {
                alert("SYSTEM STABILIZED.");
                location.reload();
            } else {
                // Getaran makin parah jika salah password
                alert("ACCESS DENIED. ACCELERATING DELETION.");
            }
        }
    </script>
</body>
</html>
